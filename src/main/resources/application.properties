spring.application.name=book-tracker-api

# conexÒo com o banco
spring.datasource.url=jdbc:mysql://localhost:3306/booktracker?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=Root@123456

# driver
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# dialeto (opcional, mas bom deixar)
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

spring.profiles.active=test