services:

  postgres:
    image: postgres:16
    container_name: librarydb

    environment:
      POSTGRES_DB: booktracker
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456

    ports:
      - "5433:5432"

    networks:
      - library-network

    volumes:
      - postgres_data:/var/lib/postgresql/data


  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin

    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin123

    ports:
      - "8081:80"

    networks:
      - library-network

    depends_on:
      - postgres


networks:
  library-network:


volumes:
  postgres_data: